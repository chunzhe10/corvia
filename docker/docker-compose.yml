services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: corvia-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: corvia
      POSTGRES_PASSWORD: corvia
      POSTGRES_DB: corvia
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
