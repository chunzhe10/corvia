[workspace]
resolver = "2"
members = [
    "crates/corvia-common",
    "crates/corvia-kernel",
    "crates/corvia-server",
    "crates/corvia-cli",
    "crates/corvia-proto",
    "crates/corvia-inference",
]

[workspace.package]
version = "0.3.1"
edition = "2024"
license = "AGPL-3.0-only"
repository = "https://github.com/corvia/corvia"
homepage = "https://github.com/corvia/corvia"
rust-version = "1.88"

[workspace.dependencies]
corvia-common = { path = "crates/corvia-common" }
corvia-kernel = { path = "crates/corvia-kernel" }
corvia-server = { path = "crates/corvia-server" }
corvia-proto = { path = "crates/corvia-proto" }
tonic = "0.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v7", "serde"] }
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Override adapter-git's transitive git deps so they resolve to local workspace crates.
# Without this, Cargo would pull corvia-common/kernel from the git tag AND use the
# local workspace versions, causing duplicate types and compilation errors.
[patch."https://github.com/chunzhe10/corvia"]
corvia-common = { path = "crates/corvia-common" }
corvia-kernel = { path = "crates/corvia-kernel" }
